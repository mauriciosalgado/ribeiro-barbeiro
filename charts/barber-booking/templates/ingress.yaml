{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "barber-booking.ingressName" . }}
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        {{- if .Values.ingress.apiHost }}
        - {{ .Values.ingress.apiHost }}
        {{- end }}
      secretName: {{ include "barber-booking.tlsSecretName" . }}
  {{- end }}
  rules:
    # The booking website. Reflex serves the page, its own event backend
    # (websocket state, /_upload, /ping, /_health, /_all_routes) and our
    # /logo proxy (see frontend/shop/api.py) all on this one port — a single
    # catch-all path is all that's needed.
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "barber-booking.frontendServiceName" . }}
                port:
                  name: web
    {{- if .Values.ingress.apiHost }}
    # apiHost is set, so this rule makes the ENTIRE FastAPI app public — every
    # route ("/" is a catch-all to the backend Service), not just /docs and
    # /admin. Only turn this on if you actually want the SQLAdmin console or
    # API docs reachable from a browser; the booking website itself never
    # needs this — it reaches the API pod-to-pod (API_URL) regardless.
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "barber-booking.backendServiceName" . }}
                port:
                  number: 8000
    {{- end }}
{{- end }}
