apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "barber-booking.fullname" . }}-backend
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
data:
  SHOP_NAME: {{ .Values.shop.name | quote }}
  SHOP_TIMEZONE: {{ .Values.shop.timezone | quote }}
  OWNER_NAME: {{ .Values.shop.owner.name | quote }}
  OWNER_EMAIL: {{ .Values.shop.owner.email | quote }}
  SHOP_BRAND: {{ .Values.shop.brand | quote }}
  SHOP_BACKGROUND: {{ .Values.shop.background | quote }}
  SHOP_HEADLINE: {{ .Values.shop.headline | quote }}
  CORS_ORIGINS: {{ include "barber-booking.corsOrigins" . | quote }}
  PUBLIC_BASE_URL: {{ include "barber-booking.publicApiUrl" . | quote }}
  FRONTEND_URL: {{ include "barber-booking.frontendUrl" . | quote }}
  SMTP_HOST: {{ .Values.email.smtpHost | quote }}
  SMTP_PORT: {{ .Values.email.smtpPort | quote }}
  SMTP_FROM: {{ .Values.email.smtpFrom | quote }}
  SMTP_STARTTLS: {{ .Values.email.smtpStartTLS | quote }}
