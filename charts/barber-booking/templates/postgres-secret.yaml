{{- if and .Values.postgresql.enabled (not .Values.postgresql.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ include "barber-booking.namespace" . }}
  name: {{ include "barber-booking.fullname" . }}-postgres
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "postgresql.password is required when postgresql.enabled=true (or set postgresql.existingSecret)" .Values.postgresql.password | quote }}
{{- end }}
