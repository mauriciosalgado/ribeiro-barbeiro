{{- /*
Only rendered if imageCredentials.password is set in values — see values.yaml
for the GitOps-preferred alternative (create this Secret out-of-band and list
it under imagePullSecrets instead, so the PAT never lands in a values file).
*/ -}}
{{- if .Values.imageCredentials.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "barber-booking.fullname" . }}-registry
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .Values.imageCredentials.registry .Values.imageCredentials.username .Values.imageCredentials.password (printf "%s:%s" .Values.imageCredentials.username .Values.imageCredentials.password | b64enc) | b64enc }}
{{- end }}
