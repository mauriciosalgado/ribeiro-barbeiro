apiVersion: v1
kind: Service
metadata:
  namespace: {{ include "barber-booking.namespace" . }}
  name: {{ include "barber-booking.fullname" . }}-frontend
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "barber-booking.fullname" . }}-frontend
  ports:
    # The page, Reflex's own event backend (websocket state, /_upload), and
    # our /logo proxy all share this one port — see rxconfig.py for why.
    - name: web
      port: 3000
      targetPort: web
