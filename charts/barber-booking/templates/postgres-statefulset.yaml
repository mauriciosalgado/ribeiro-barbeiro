{{- if .Values.postgresql.enabled }}
# A plain, single-replica Postgres for one shop's traffic — no external chart
# dependency, so it's easy to read top to bottom. For a busier shop or if you
# already run a managed Postgres, point database.externalUrl at that instead
# and leave postgresql.enabled false.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "barber-booking.fullname" . }}-postgres
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "barber-booking.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "barber-booking.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "barber-booking.fullname" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "barber-booking.postgresSecretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgresql.storageClassName }}
        storageClassName: {{ .Values.postgresql.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
{{- end }}
