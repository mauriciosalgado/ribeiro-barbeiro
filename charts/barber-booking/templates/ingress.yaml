{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "barber-booking.fullname" . }}
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        {{- if .Values.ingress.apiHost }}
        - {{ .Values.ingress.apiHost }}
        {{- end }}
      secretName: {{ include "barber-booking.tlsSecretName" . }}
  {{- end }}
  rules:
    # The booking website. Reflex serves the page on :3000 and its own
    # websocket/upload/health endpoints (/_event, /_upload, /ping, /_health,
    # /_all_routes, /logo) on :8001 — all reachable under this one host,
    # which is why REFLEX_API_URL (frontend ConfigMap) is set to this same
    # hostname. /logo is a proxy to the booking API's logo image (see
    # frontend/shop/api.py) so the API itself never needs to be public.
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /_event
            pathType: Prefix
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-frontend
                port:
                  name: events
          - path: /_upload
            pathType: Prefix
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-frontend
                port:
                  name: events
          - path: /ping
            pathType: Exact
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-frontend
                port:
                  name: events
          - path: /_health
            pathType: Exact
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-frontend
                port:
                  name: events
          - path: /_all_routes
            pathType: Exact
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-frontend
                port:
                  name: events
          - path: /logo
            pathType: Exact
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-frontend
                port:
                  name: events
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-frontend
                port:
                  name: web
    {{- if .Values.ingress.apiHost }}
    # apiHost is set, so this rule makes the ENTIRE FastAPI app public — every
    # route ("/" is a catch-all to the backend Service), not just /docs and
    # /admin. Only turn this on if you actually want the SQLAdmin console or
    # API docs reachable from a browser; the booking website itself never
    # needs this — it reaches the API pod-to-pod (API_URL) regardless.
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "barber-booking.fullname" . }}-backend
                port:
                  number: 8000
    {{- end }}
{{- end }}
