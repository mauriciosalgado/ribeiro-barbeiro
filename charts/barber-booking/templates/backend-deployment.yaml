apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "barber-booking.backendDeploymentName" . }}
  labels:
    {{- include "barber-booking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "barber-booking.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "barber-booking.fullname" . }}-backend
    spec:
      {{- include "barber-booking.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000 # matches the "app" user created in backend/Dockerfile
        runAsGroup: 1000
        fsGroup: 1000 # so the mounted PVC is writable by that user
      {{- if eq .Values.database.type "sqlite" }}
      # Not every storage class honors the fsGroup above (many NFS CSI
      # drivers report fsGroupPolicy: None and silently skip the chown,
      # leaving /data owned by whatever the storage server set — the app
      # then fails with "unable to open database file"). This runs once as
      # root, works regardless of the storage backend, and costs nothing on
      # backends where fsGroup already worked.
      initContainers:
        - name: fix-data-permissions
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          command: ["chown", "-R", "1000:1000", "/data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "barber-booking.backendConfigMapName" . }}
            - secretRef:
                name: {{ include "barber-booking.backendSecretName" . }}
          env:
            {{- if and (eq .Values.database.type "postgres") .Values.postgresql.enabled }}
            # Must come before DATABASE_URL below — Kubernetes only expands
            # $(VAR) references against variables already defined earlier in
            # this same "env:" list (not against ConfigMap/Secret envFrom).
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "barber-booking.postgresSecretName" . }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            - name: DATABASE_URL
              value: {{ include "barber-booking.databaseUrl" . | quote }}
          {{- if eq .Values.database.type "sqlite" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          # Startup: covers slow first boots (table creation, cold storage
          # I/O) without liveness killing the pod mid-start — once this
          # succeeds once, liveness/readiness take over.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 2
          # Liveness: the process is up. Readiness: it can reach its database.
          # timeoutSeconds above the 1s default: a slow disk (e.g. network
          # storage under load) shouldn't look like a dead process.
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
      {{- if eq .Values.database.type "sqlite" }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "barber-booking.dataPvcName" . }}
      {{- end }}
